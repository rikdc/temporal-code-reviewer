version: '3.8'

services:
  postgresql:
    image: postgres:15-alpine
    container_name: lyon-postgres
    environment:
      POSTGRES_PASSWORD: temporal
      POSTGRES_USER: temporal
      POSTGRES_DB: temporal
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temporal"]
      interval: 5s
      timeout: 5s
      retries: 10

  temporal:
    image: temporalio/auto-setup:1.25.0
    container_name: lyon-temporal
    depends_on:
      postgresql:
        condition: service_healthy
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=temporal
      - POSTGRES_PWD=temporal
      - POSTGRES_SEEDS=postgresql
      - SKIP_DYNAMIC_CONFIG_UPDATE=true
    ports:
      - "7233:7233"
    healthcheck:
      test: ["CMD", "tctl", "--address", "temporal:7233", "cluster", "health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  temporal-ui:
    image: temporalio/ui:2.30.0
    container_name: lyon-temporal-ui
    depends_on:
      temporal:
        condition: service_healthy
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CORS_ORIGINS=http://localhost:3000
    ports:
      - "8080:8080"

  lyon:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lyon-service
    depends_on:
      temporal:
        condition: service_healthy
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      # Provider selection — CONFIG_FILE picks the right model IDs
      - CONFIG_FILE=${CONFIG_FILE:-config.yaml}
      # OpenRouter credentials (when using openrouter provider)
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      # AWS auth — profile-based via mounted ~/.aws (when using bedrock provider)
      - AWS_PROFILE=${AWS_PROFILE:-}
      - AWS_REGION=${AWS_REGION:-}
    volumes:
      # Mount host AWS config for SSO/profile-based auth
      - ${HOME}/.aws:/root/.aws:ro
    ports:
      - "8081:8081"  # Dashboard
      - "8082:8082"  # Webhook
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8082/health"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
