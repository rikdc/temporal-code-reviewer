openrouter:
  api_key: ""  # Set via OPENROUTER_API_KEY env var
  base_url: "https://openrouter.ai/api/v1"
  timeout: 120

agents:
  security:
    model: "anthropic/claude-sonnet-4"
    max_tokens: 2000
    temperature: 0.3
    prompt_file: "security.md"

  style:
    model: "anthropic/claude-3.5-haiku"
    max_tokens: 1500
    temperature: 0.5
    prompt_file: "style.md"

  logic:
    model: "anthropic/claude-sonnet-4"
    max_tokens: 2000
    temperature: 0.3
    prompt_file: "logic.md"

  documentation:
    model: "anthropic/claude-3.5-haiku"
    max_tokens: 1500
    temperature: 0.5
    prompt_file: "documentation.md"

  triage:
    model: "anthropic/claude-sonnet-4"
    max_tokens: 8000
    temperature: 0.2
    prompt_file: "triage.md"

  fix_generator:
    model: "anthropic/claude-haiku-4-5"
    max_tokens: 2000
    temperature: 0.1
    prompt_file: ""
