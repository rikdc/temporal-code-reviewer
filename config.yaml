openrouter:
  api_key: ""  # Set via OPENROUTER_API_KEY env var
  base_url: "https://openrouter.ai/api/v1"
  timeout: 120

auto_fix_users: []
# auto_fix_users:
#   - your-github-login

temporal:
  namespace: "code-reviewer"  # use a dedicated namespace locally to reduce UI clutter
  dashboard_base_url: ""  # Temporal UI base URL; overridden by TEMPORAL_UI_URL env var. Defaults to http://localhost:8081

poller:
  enabled: false
  interval_seconds: 900  # 15 minutes
  repos: []
  # repos:
  #   - owner/repo-name
  filters:
    max_age_days: 5         # skip PRs older than this; 0 = no limit
    skip_drafts: true       # skip draft PRs
    skip_bots: true         # skip PRs authored by GitHub bot accounts (e.g. dependabot)
    require_reviewer_logins: []
    # require_reviewer_logins:
    #   - your-github-login  # only review PRs where you are a requested reviewer

agents:
  security:
    model: "anthropic/claude-sonnet-4"
    max_tokens: 2000
    temperature: 0.3
    prompt_file: "security.md"

  style:
    model: "anthropic/claude-3.5-haiku"
    max_tokens: 1500
    temperature: 0.5
    prompt_file: "style.md"

  logic:
    model: "anthropic/claude-sonnet-4"
    max_tokens: 2000
    temperature: 0.3
    prompt_file: "logic.md"

  documentation:
    model: "anthropic/claude-3.5-haiku"
    max_tokens: 1500
    temperature: 0.5
    prompt_file: "documentation.md"

  triage:
    model: "anthropic/claude-sonnet-4"
    max_tokens: 8000
    temperature: 0.2
    prompt_file: "triage.md"

  fix_generator:
    model: "anthropic/claude-haiku-4-5"
    max_tokens: 2000
    temperature: 0.1
    prompt_file: ""
